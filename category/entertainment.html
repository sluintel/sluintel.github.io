<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2480859517203371" crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WJEQKLB827"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WJEQKLB827');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Category — Sujit Luintel</title>
  <meta name="description" id="pageDesc" content="Articles on Sujit Luintel">
  <link rel="stylesheet" href="/assets/css/sl-home.css">
  <style>
    .sl-cat-header{background:var(--hero-bg);color:var(--hero-text);padding:52px 24px 44px;position:relative;overflow:hidden;}
    .sl-cat-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 10% 50%,var(--cat-glow,rgba(99,102,241,.18)) 0%,transparent 60%);pointer-events:none;}
    .sl-cat-inner{max-width:1280px;margin:0 auto;position:relative;}
    .sl-breadcrumb{font-size:.8rem;color:rgba(242,241,235,.5);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .sl-breadcrumb a{color:inherit;transition:color .2s;}.sl-breadcrumb a:hover{color:var(--accent);}
    .sl-cat-emoji{font-size:2.5rem;line-height:1;display:block;margin-bottom:12px;}
    .sl-cat-h1{font-family:var(--font-display);font-size:clamp(1.75rem,4vw,3rem);font-weight:700;letter-spacing:-.02em;color:var(--hero-text);margin-bottom:8px;}
    .sl-cat-count{font-size:.875rem;color:rgba(242,241,235,.45);margin-bottom:18px;}
    .sl-cat-chips{display:flex;flex-wrap:wrap;gap:7px;}
    .sl-cat-chip{font-size:.68rem;font-weight:600;letter-spacing:.04em;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.07);color:rgba(242,241,235,.6);border:1px solid rgba(255,255,255,.1);}
    .sl-filter-bar{max-width:1280px;margin:0 auto;padding:20px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .sl-filter-label{font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);}
    .sl-filter-btn{font-size:.8rem;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all .2s;}
    .sl-filter-btn:hover,.sl-filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),.06);}
    .sl-pp-select{margin-left:auto;font-size:.8rem;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);cursor:pointer;}
    .sl-cat-grid{max-width:1280px;margin:0 auto;padding:28px 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
    .sl-cat-grid .sl-card-img-wrap{height:200px;}
    .sl-cat-grid .sl-card{opacity:0;transform:translateY(12px);transition:opacity .35s,transform .35s;}
    .sl-cat-grid .sl-card.visible{opacity:1;transform:none;}
    .sl-pager{max-width:1280px;margin:0 auto 80px;padding:0 24px;display:flex;align-items:center;justify-content:center;gap:7px;}
    .sl-pg{width:36px;height:36px;border-radius:6px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);font-size:.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .sl-pg:hover,.sl-pg.cur{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),.06);}
    .sl-pg:disabled{opacity:.35;cursor:not-allowed;}
    @media(max-width:600px){.sl-cat-grid{grid-template-columns:1fr;padding:20px 16px 60px;}.sl-filter-bar{padding:14px 16px 0;}}
  </style>
</head>
<body>

<nav class="sl-nav">
  <div class="sl-nav-inner">
    <a class="sl-nav-brand" href="/">Sujit<span>Luintel</span></a>
    <div class="sl-nav-links">
      <a class="sl-nav-link" href="/">← Home</a>
      <button class="sl-theme-toggle" id="themeToggle" aria-label="Toggle dark mode"><span class="sl-theme-icon">🌙</span></button>
    </div>
  </div>
</nav>

<header class="sl-cat-header" id="catHeader">
  <div class="sl-cat-inner">
    <div class="sl-breadcrumb"><a href="/">Home</a><span>›</span><span id="breadLabel">Category</span></div>
    <span class="sl-cat-emoji" id="catEmoji">📰</span>
    <h1 class="sl-cat-h1" id="catTitle">Loading…</h1>
    <p class="sl-cat-count" id="catCount"></p>
    <div class="sl-cat-chips" id="catChips"></div>
  </div>
</header>

<div class="sl-filter-bar">
  <span class="sl-filter-label">Sort</span>
  <button class="sl-filter-btn active" data-sort="newest">Newest</button>
  <button class="sl-filter-btn" data-sort="oldest">Oldest</button>
  <select class="sl-pp-select" id="ppSel"><option value="12">12 per page</option><option value="24">24 per page</option><option value="48">48 per page</option></select>
</div>

<div class="sl-cat-grid" id="catGrid"></div>
<div class="sl-pager" id="pager"></div>

<footer class="sl-footer">
  <div class="sl-footer-inner">
    <div>
      <div class="sl-footer-brand">Sujit<span>Luintel</span></div>
      <p class="sl-footer-desc">AI Tools &amp; Automation Insights — auto-published daily.</p>
    </div>
    <div class="sl-footer-links">
      <a class="sl-footer-link" href="/">Home</a>
      <a class="sl-footer-link" href="/category/ai-automation.html">AI &amp; Automation</a>
      <a class="sl-footer-link" href="/category/sports.html">Sports</a>
      <a class="sl-footer-link" href="/category/technology.html">Technology</a>
      <a class="sl-footer-link" href="/dashboard/">Dashboard</a>
    </div>
  </div>
  <div class="sl-footer-copy">© 2026 Sujit Luintel · Auto-published with AI</div>
</footer>

<script>
(function(){
  // Theme
  const html=document.documentElement,btn=document.getElementById('themeToggle'),icon=btn&&btn.querySelector('.sl-theme-icon');
  function applyTheme(t){html.setAttribute('data-theme',t);if(icon)icon.textContent=t==='dark'?'☀️':'🌙';try{localStorage.setItem('sl-theme',t);}catch(e){}}
  function getPref(){try{const s=localStorage.getItem('sl-theme');if(s)return s;}catch(e){}return matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
  applyTheme(getPref());
  if(btn) btn.addEventListener('click',()=>applyTheme(html.getAttribute('data-theme')==='dark'?'light':'dark'));

  // Get category slug from URL: /category/sports.html → sports
  const slug = location.pathname.replace(/.*\/category\//,'').replace(/\.html$/,'').replace(/\/$/,'') || 'all';

  let allPosts=[], catPosts=[], pp=12, page=1, sortAsc=false;

  function readTime(w){ return Math.max(1,Math.round((w||300)/200)); }
  function fmtDate(d){ if(!d) return ''; try{ return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return d; } }

  function matchesCat(post, catData){
    if(slug==='all') return true;
    if(!catData||!catData.tags||!catData.tags.length) return false;
    const catTags=catData.tags.map(t=>t.toLowerCase());
    const postTags=(post.tags||[]).map(t=>t.toLowerCase());
    const titleLow=(post.title||'').toLowerCase();
    return postTags.some(pt=>catTags.some(ct=>pt.includes(ct)||ct.includes(pt))) ||
           catTags.some(ct=>titleLow.includes(ct));
  }

  function renderCard(post){
    const rt=readTime(post.wordCount), img=post.image||'';
    const t0=(post.tags&&post.tags[0])||'', t1=(post.tags&&post.tags[1])||'';
    return `<article class="sl-card">
      <a class="sl-card-img-wrap" href="${post.url}" style="height:200px;" tabindex="-1" aria-hidden="true">
        ${img?`<img class="sl-card-img" src="${img}" alt="" loading="lazy" onerror="this.parentElement.classList.add('sl-card-img-wrap--placeholder');this.remove()">`:`<div class="sl-card-img-placeholder" style="--hue:${(post.title||'').length%360}"></div>`}
      </a>
      <div class="sl-card-body">
        <div class="sl-card-meta">${t0?`<span class="sl-tag">${t0}</span>`:''}${t1?`<span class="sl-tag sl-tag--secondary">${t1}</span>`:''}</div>
        <h3 class="sl-card-title"><a href="${post.url}">${post.title||'Untitled'}</a></h3>
        <p class="sl-card-excerpt">${(post.excerpt||'').substring(0,120)}</p>
        <div class="sl-card-footer"><time>${fmtDate(post.date)}</time><span class="sl-card-dot">·</span><span>${rt} min read</span></div>
      </div>
    </article>`;
  }

  function sorted(){ return [...catPosts].sort((a,b)=>sortAsc?a.date.localeCompare(b.date):b.date.localeCompare(a.date)); }

  function render(){
    const grid=document.getElementById('catGrid');
    const cards=sorted();
    const total=Math.ceil(cards.length/pp)||1;
    page=Math.min(page,total);
    const s=(page-1)*pp, slice=cards.slice(s,s+pp);
    grid.innerHTML=slice.length?slice.map(renderCard).join(''):`<div class="sl-empty" style="grid-column:1/-1">No articles in this category yet — new posts publish daily!</div>`;
    // Animate
    grid.querySelectorAll('.sl-card').forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),i*35));
    buildPager(total);
  }

  function buildPager(total){
    const pager=document.getElementById('pager'); pager.innerHTML='';
    if(total<=1) return;
    const prev=mkBtn('←',page===1);
    prev.addEventListener('click',()=>{page--;render();scrollToGrid();});
    pager.appendChild(prev);
    let lo=Math.max(1,page-3),hi=Math.min(total,lo+6);lo=Math.max(1,hi-6);
    for(let i=lo;i<=hi;i++){
      const b=mkBtn(i,false,i===page);
      b.addEventListener('click',(p=>()=>{page=p;render();scrollToGrid();})(i));
      pager.appendChild(b);
    }
    const next=mkBtn('→',page===total);
    next.addEventListener('click',()=>{page++;render();scrollToGrid();});
    pager.appendChild(next);
  }
  function mkBtn(label,disabled,cur){ const b=document.createElement('button'); b.className='sl-pg'+(cur?' cur':''); b.textContent=label; b.disabled=!!disabled; return b; }
  function scrollToGrid(){ document.getElementById('catGrid').scrollIntoView({behavior:'smooth',block:'start'}); }

  document.querySelectorAll('[data-sort]').forEach(b=>{
    b.addEventListener('click',function(){
      document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('active'));
      this.classList.add('active'); sortAsc=this.dataset.sort==='oldest'; page=1; render();
    });
  });
  document.getElementById('ppSel').addEventListener('change',function(){pp=+this.value;page=1;render();});

  async function init(){
    const [configRes, postsRes] = await Promise.all([
      fetch('/assets/js/sections-config.json').then(r=>r.ok?r.json():null).catch(()=>null),
      fetch('/assets/js/posts-data.json').then(r=>r.ok?r.json():[]).catch(()=>[])
    ]);

    allPosts = postsRes||[];
    const catData = configRes && configRes.categories && configRes.categories[slug];
    const label = catData ? catData.label : slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const icon  = catData ? catData.icon : '📰';
    const color = catData ? catData.color : '#6366f1';
    const tags  = catData ? (catData.tags||[]) : [];

    // Update UI
    document.getElementById('pageTitle').textContent=`${label} — Sujit Luintel`;
    document.getElementById('pageDesc').content=`Articles about ${label} on Sujit Luintel`;
    document.getElementById('breadLabel').textContent=label;
    document.getElementById('catEmoji').textContent=icon;
    document.getElementById('catTitle').textContent=label;
    document.getElementById('catHeader').style.setProperty('--cat-glow',color+'30');

    catPosts = allPosts.filter(p=>matchesCat(p,catData));
    document.getElementById('catCount').textContent=catPosts.length+' articles';
    document.getElementById('catChips').innerHTML=tags.slice(0,14).map(t=>`<span class="sl-cat-chip">${t}</span>`).join('');

    if(!allPosts.length){
      document.getElementById('catGrid').innerHTML=`<div class="sl-empty" style="grid-column:1/-1">
        <p style="margin-bottom:8px;font-weight:600;">Posts not indexed yet</p>
        <p style="font-size:.875rem;color:var(--text-3);margin-bottom:12px;">Go to the Dashboard → Post Indexer and run the indexer to populate this page.</p>
        <a href="/dashboard/" style="color:var(--accent);font-weight:600;">Open Dashboard →</a>
      </div>`;
      return;
    }
    render();
  }

  init().catch(console.error);
})();
</script>
</body>
</html>
