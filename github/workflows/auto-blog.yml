name: 🤖 Auto Blog Publisher

on:
  schedule:
    # Runs daily at 01:15 UTC = 06:45 AM Nepal Time (NPT is UTC+5:45)
    - cron: '15 1 * * *'
  workflow_dispatch:   # ← also lets you trigger manually from GitHub UI

permissions:
  contents: write      # needed to commit & push new posts

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Generate & publish today's blog post
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scripts/generate_post.py

      - name: 📝 Commit and push new post
        run: |
          git config --global user.name  "SluIntel Bot"
          git config --global user.email "bot@sluintel.github.io"
          git add -A
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "🤖 Auto-publish: $(date +'%Y-%m-%d')"
          git push
