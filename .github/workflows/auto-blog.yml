name: Auto Blog Generator

on:
  # ── Nepal Standard Time (NPT) = UTC+5:45 ──────────────────────────────────
  # GitHub Actions cron runs in UTC, so subtract 5h45m from your target NPT time.
  #
  # To post every hour NPT we schedule every hour in UTC.
  # NPT is UTC+5:45, so each UTC hour corresponds to a different NPT hour,
  # but since we want all 24 NPT hours covered, we simply run every UTC hour.
  # :15 is used as the minute to avoid the busy top-of-hour queue on GitHub.
  #
  # UTC 00:15 → 05:45 NPT  |  UTC 01:15 → 06:45 NPT  |  UTC 02:15 → 07:45 NPT
  # UTC 03:15 → 08:45 NPT  |  UTC 04:15 → 09:45 NPT  |  UTC 05:15 → 10:45 NPT
  # UTC 06:15 → 11:45 NPT  |  UTC 07:15 → 12:45 NPT  |  UTC 08:15 → 13:45 NPT
  # UTC 09:15 → 14:45 NPT  |  UTC 10:15 → 15:45 NPT  |  UTC 11:15 → 16:45 NPT
  # UTC 12:15 → 17:45 NPT  |  UTC 13:15 → 18:45 NPT  |  UTC 14:15 → 19:45 NPT
  # UTC 15:15 → 20:45 NPT  |  UTC 16:15 → 21:45 NPT  |  UTC 17:15 → 22:45 NPT
  # UTC 18:15 → 23:45 NPT  |  UTC 19:15 → 00:45 NPT  |  UTC 20:15 → 01:45 NPT
  # UTC 21:15 → 02:45 NPT  |  UTC 22:15 → 03:45 NPT  |  UTC 23:15 → 04:45 NPT
  schedule:
    - cron: "15 0 * * *"   # 05:45 NPT
    - cron: "15 1 * * *"   # 06:45 NPT
    - cron: "15 2 * * *"   # 07:45 NPT
    - cron: "15 3 * * *"   # 08:45 NPT
    - cron: "15 4 * * *"   # 09:45 NPT
    - cron: "15 5 * * *"   # 10:45 NPT
    - cron: "15 6 * * *"   # 11:45 NPT
    - cron: "15 7 * * *"   # 12:45 NPT
    - cron: "15 8 * * *"   # 13:45 NPT
    - cron: "15 9 * * *"   # 14:45 NPT
    - cron: "15 10 * * *"  # 15:45 NPT
    - cron: "15 11 * * *"  # 16:45 NPT
    - cron: "15 12 * * *"  # 17:45 NPT
    - cron: "15 13 * * *"  # 18:45 NPT
    - cron: "15 14 * * *"  # 19:45 NPT
    - cron: "15 15 * * *"  # 20:45 NPT
    - cron: "15 16 * * *"  # 21:45 NPT
    - cron: "15 17 * * *"  # 22:45 NPT
    - cron: "15 18 * * *"  # 23:45 NPT
    - cron: "15 19 * * *"  # 00:45 NPT
    - cron: "15 20 * * *"  # 01:45 NPT
    - cron: "15 21 * * *"  # 02:45 NPT
    - cron: "15 22 * * *"  # 03:45 NPT
    - cron: "15 23 * * *"  # 04:45 NPT

  # Allow manual trigger from the Actions tab at any time
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    # Give the job write permission so it can push back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout the full repo so we can read & write files ────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for a clean push

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      #    pytrends is intentionally removed — we now use the Google Trends
      #    RSS feed directly via the standard `requests` library.
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            Pillow \
            google-genai \
            requests

      # ── 4. Run the blog generator ─────────────────────────────────────────
      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_post.py

      # ── 5. Commit & push everything that changed ──────────────────────────
      - name: Commit and push new post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          # Only commit if there is actually something new to commit
          if git diff --cached --quiet; then
            echo "Nothing to commit — skipping push"
          else
            # Include NPT timestamp in the commit message for clarity
            NPT_TIME=$(TZ='Asia/Kathmandu' date '+%Y-%m-%d %H:%M NPT')
            git commit -m "🤖 Auto-post: ${NPT_TIME}"
            git push
          fi
