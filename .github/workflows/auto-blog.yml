name: Auto Blog Generator

on:
  # ── Nepal Standard Time (NPT) = UTC+5:45 ──────────────────────────────────
  # GitHub Actions cron runs in UTC, so subtract 5h45m from your target NPT time.
  #
  # Slot 1 → 08:00 NPT  =  02:15 UTC   (morning post, catches overnight trends)
  # Slot 2 → 18:00 NPT  =  12:15 UTC   (evening post, catches afternoon trends)
  #
  # GitHub cron does not support :45 minutes for the hour offset, so we use
  # :15 which is the closest standard minute that lands at a whole NPT hour.
  schedule:
    - cron: "15 2 * * *"   # 08:00 NPT  — morning publish
    - cron: "15 12 * * *"  # 18:00 NPT  — evening publish (remove if 1 post/day preferred)

  # Allow manual trigger from the Actions tab at any time
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    # Give the job write permission so it can push back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout the full repo so we can read & write files ────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for a clean push

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      #    pytrends is intentionally removed — we now use the Google Trends
      #    RSS feed directly via the standard `requests` library.
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            google-genai \
            requests

      # ── 4. Run the blog generator ─────────────────────────────────────────
      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_post.py

      # ── 5. Commit & push everything that changed ──────────────────────────
      - name: Commit and push new post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          # Only commit if there is actually something new to commit
          if git diff --cached --quiet; then
            echo "Nothing to commit — skipping push"
          else
            # Include NPT timestamp in the commit message for clarity
            NPT_TIME=$(TZ='Asia/Kathmandu' date '+%Y-%m-%d %H:%M NPT')
            git commit -m "🤖 Auto-post: ${NPT_TIME}"
            git push
          fi
